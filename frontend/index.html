<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Trading Terminal</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background:#020617;
  color:white;
  text-align:center;
}

.container {
  margin-top:50px;
}

input, button {
  padding:10px;
  margin:10px;
  width:200px;
}

canvas {
  max-width:600px;
  margin-top:30px;
}
</style>
</head>

<body>

<div class="container">

<h1>🔐 Login</h1>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Passwort">

<br>
<button onclick="login()">Login</button>

<h2 id="status"></h2>

<canvas id="chart"></canvas>

</div>

<script>

let chart;

async function login() {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = const res = await fetch("https://ai-trading-production-2f39.up.railway.app/login", {
    method:"POST",
    headers: {
      "Content-Type":"application/json"
    },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if(data.token){
    document.getElementById("status").innerText = "Login erfolgreich ✅";
    loadData();
  } else {
    document.getElementById("status").innerText = "Login fehlgeschlagen ❌";
  }
}

function loadData(){

  let data = [];

  for(let i=0;i<20;i++){
    data.push(100 + Math.random()*20);
  }

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type:"line",
    data:{
      labels:data.map((_,i)=>i),
      datasets:[{
        label:"Markt",
        data:data
      }]
    }
  });

}

</script>

</body>
</html>
